name: Publish

# Push a version tag to release everywhere:
#   npm version patch|minor|major   # bumps package.json + creates the tag
#   git push --follow-tags
# (Make sure server.json's version matches the tag — the guard below enforces it.)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm provenance + MCP Registry OIDC login

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Verify tag matches package.json and server.json
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          SRV="$(node -p "require('./server.json').version")"
          echo "tag=$TAG package.json=$PKG server.json=$SRV"
          if [ "$TAG" != "$PKG" ] || [ "$TAG" != "$SRV" ]; then
            echo "::error::Version mismatch — tag must equal package.json and server.json versions."
            exit 1
          fi

      - run: npm ci

      - run: npm test

      - run: npm run build

      - name: Publish to npm (with provenance)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if npm view "agentify-openapi@${VERSION}" version >/dev/null 2>&1; then
            echo "::notice::agentify-openapi@${VERSION} already on npm — skipping publish."
          else
            npm publish --provenance --access public
          fi

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          ./mcp-publisher --help >/dev/null

      - name: Publish to the MCP Registry (GitHub OIDC)
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "::notice::Release $GITHUB_REF_NAME already exists — skipping."
          else
            gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME"
          fi
